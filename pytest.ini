[pytest]
testpaths = tests
python_files = test_*.py
addopts = -v --html=tests/reports/report.html --self-contained-html

markers =
    critical : Test failure indicates a hard data integrity violation (broken FK, impossible timestamp, duplicate PK).
    warning  : Test failure indicates a data quality issue that degrades analytics accuracy but does not break queries.
    info     : Test failure indicates a minor anomaly or intentionally injected defect present in the synthetic dataset.
